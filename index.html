<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandanus Kiosk - FIFA World Cup 2026 Perfect Fit</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* මුළු සිස්ටම් එකේම Scrollbars සම්පූර්ණයෙන්ම නැති කිරීම */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; cursor: none; -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }
        
        body {
            color: white; height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            background-color: #030a1c;
            position: relative;
        }

        /* --- Official FIFA World Cup 2026 Background Image Area --- */
        .bg-fullscreen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(to bottom, rgba(12, 24, 68, 0.55) 0%, rgba(3, 10, 28, 0.95) 100%),
                url('https://www.cancunairporttransportations.com/blog/wp-content/uploads/FIFA-world-cup-2026.webp');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- Header Section --- */
        .header {
            padding-top: 25px;
            padding-bottom: 5px;
            width: 100%;
            height: 12vh;
        }
        .hotel-name {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }
        .kiosk-title {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 40%, #ffeb3b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 235, 59, 0.15);
            margin-top: 2px;
        }

        /* --- Main Kiosk Content Layout --- */
        .main-content {
            height: 73vh;
            width: 100%;
            padding: 0 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* කොටස් 3 මනාව තිරය පුරා බෙදා හැරීමට */
            align-items: center;
        }

        /* FEATURED / LIVE MATCH BOX */
        .featured-match-box {
            width: 100%;
            max-width: 950px;
            height: 32vh; /* උස ප්‍රමාණය අඩු කර වඩාත් පැහැදිලි කළා */
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .featured-match-box.live-active {
            border: 1.5px solid #ff5252;
            box-shadow: 0 0 35px rgba(255, 82, 82, 0.25), 0 20px 40px rgba(0,0,0,0.5);
        }

        .live-badge {
            background: linear-gradient(135deg, #ff5252, #c62828);
            color: white;
            padding: 5px 18px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
            box-shadow: 0 0 20px rgba(255, 82, 82, 0.5);
            position: absolute;
            top: -14px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }

        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .team-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team-flag {
            font-size: 5.5rem;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
        }

        .team-name {
            font-size: 2.1rem;
            font-weight: 800;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box {
            font-size: 7.5rem;
            font-weight: 900;
            padding: 0 30px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .vs-box {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffeb3b;
            font-style: italic;
        }

        .match-status {
            font-size: 1.3rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 20px;
            border-radius: 50px;
            margin-top: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffeb3b;
        }

        /* --- Bottom Timetable Board --- */
        .advice-container {
            width: 100%;
            max-width: 950px;
            height: 24vh; /* උස සීමා කර Scroll වීම සම්පූර්ණයෙන්ම නැවැත්තුවා */
            display: flex;
            flex-direction: column;
        }
        .advice-card {
            background: rgba(3, 10, 28, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            height: 100%;
            padding: 15px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }
        .adv-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffeb3b; 
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: left;
            border-left: 4px solid #ffeb3b;
            padding-left: 8px;
        }
        
        .match-list-mini {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden; /* Scroll වීම වළක්වයි */
        }

        .mini-match-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.35rem;
            font-weight: 600;
        }

        .mini-status {
            color: #ffeb3b;
            font-size: 1.25rem;
            font-weight: 800;
        }

        /* --- 📺 THEPAPARE LIVE STREAM CARD AREA --- */
        .broadcast-container {
            width: 100%;
            max-width: 950px;
            height: 11vh;
        }
        .broadcast-card {
            background: rgba(94, 23, 145, 0.18);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(153, 50, 204, 0.35);
            border-radius: 16px;
            padding: 10px 30px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .channel-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .channel-logo {
            height: 38px;
            object-fit: contain;
        }
        .broadcast-text text-align: left;
        .broadcast-text h4 {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .broadcast-text p {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
        }
        .channel-badges {
            display: flex;
            gap: 10px;
        }
        .ch-badge {
            background: linear-gradient(135deg, #9932cc, #5e1791);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 800;
        }

        /* --- Kiosk Footer Clock --- */
        .kiosk-footer {
            width: 100%;
            background: #020612; 
            padding: 15px 0;
            height: 11vh;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        #clock {
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            background: linear-gradient(to bottom, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #date {
            font-size: 1.3rem;
            opacity: 0.5;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="bg-fullscreen"></div>
    <div class="vignette"></div>

    <div class="header">
        <div class="hotel-name">PANDANUS BEACH Resort & Spa</div>
        <div class="kiosk-title">FIFA World Cup 2026</div>
    </div>

    <div class="main-content">
        <!-- FEATURED BOX (32vh) -->
        <div class="featured-match-box" id="featuredMatchBox"></div>

        <!-- TIMETABLE BOX (24vh) -->
        <div class="advice-container">
            <div class="advice-card">
                <div class="adv-title" id="listTitle">Match Timetable</div>
                <div class="match-list-mini" id="miniMatchList"></div>
            </div>
        </div>

        <!-- THEPAPARE TV BOX (11vh) -->
        <div class="broadcast-container">
            <div class="broadcast-card">
                <div class="channel-info">
                    <img src="https://www.thepapare.com/wp-content/uploads/Logo-01.png" alt="ThePapare TV" class="channel-logo">
                    <div class="broadcast-text" style="text-align: left;">
                        <h4 style="font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Official Broadcaster</h4>
                        <p style="font-size: 1rem; opacity: 0.7;">Watch live on Dialog TV</p>
                    </div>
                </div>
                <div class="channel-badges">
                    <div class="ch-badge">CH 62</div>
                    <div class="ch-badge">CH 127</div>
                    <div class="ch-badge">CH 128</div>
                </div>
            </div>
        </div>
    </div>

    <div class="kiosk-footer">
        <div id="clock">00:00:00</div>
        <div id="date">--</div>
    </div>

    <script>
        // 2026 ලෝක කුසලාන තරග දත්ත (Sri Lanka Local Time)
        const worldCupMatches = [
            { "date": "2026-06-16", "time": "00:30", "team1": "Belgium", "team2": "Egypt", "group": "Group G", "score1": 1, "score2": 1, "isFinished": true },
            { "date": "2026-06-16", "time": "03:30", "team1": "Saudi Arabia", "team2": "Uruguay", "group": "Group H", "score1": 1, "score2": 1, "isFinished": true },
            { "date": "2026-06-16", "time": "06:30", "team1": "Iran", "team2": "New Zealand", "group": "Group G", "score1": 2, "score2": 2, "isFinished": true },
            { "date": "2026-06-16", "time": "00:30", "team1": "France", "team2": "Senegal", "group": "Group I", "isNextDayUserTime": true },
            { "date": "2026-06-16", "time": "03:30", "team1": "Iraq", "team2": "Norway", "group": "Group I", "isNextDayUserTime": true },
            { "date": "2026-06-16", "time": "06:30", "team1": "Argentina", "team2": "Algeria", "group": "Group J", "isNextDayUserTime": true },
            { "date": "2026-06-16", "time": "09:30", "team1": "Austria", "team2": "Jordan", "group": "Group J", "isNextDayUserTime": true }
        ];

        const countryFlags = {
            "France": "🇫🇷", "Senegal": "🇸🇳", "Iraq": "🇮🇶", "Norway": "🇳🇴", "Argentina": "🇦🇷", 
            "Algeria": "🇩🇿", "Austria": "🇦🇹", "Jordan": "🇯🇴", "Belgium": "🇧🇪", "Egypt": "🇪🇬", 
            "Saudi Arabia": "🇸🇦", "Uruguay": "🇺🇾", "Iran": "🇮🇷", "New Zealand": "🇳🇿"
        };

        function getFlag(teamName) { return countryFlags[teamName] || "⚽"; }

        function processKioskDisplay() {
            const now = new Date();
            const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');

            const featuredBox = document.getElementById('featuredMatchBox');
            const miniList = document.getElementById('miniMatchList');
            const listTitle = document.getElementById('listTitle');

            let todayMatches = worldCupMatches; // මෙම දර්ශනය සඳහා අද දින දත්ත ලබා ගැනීම

            todayMatches.forEach(m => {
                const [hrs, mins] = m.time.split(':');
                let matchDate = new Date(now);
                if (m.isNextDayUserTime) matchDate.setDate(now.getDate() + 1);
                matchDate.setHours(parseInt(hrs), parseInt(mins), 0, 0);
                
                m.matchStartTime = matchDate.getTime();
                m.matchEndTime = m.matchStartTime + (2 * 60 * 60 * 1000);
                m.timeDisplay = hrs + ":" + mins + (m.isNextDayUserTime ? " (Tomorrow)" : " (Tonight)");
            });

            const currentTime = now.getTime();
            let featured = todayMatches.find(m => !m.isFinished && currentTime >= m.matchStartTime && currentTime <= m.matchEndTime) || 
                           todayMatches.find(m => !m.isFinished && currentTime < m.matchStartTime) || 
                           todayMatches[todayMatches.length - 1];

            let featuredState = 'UPCOMING';
            if (featured.isFinished) featuredState = 'FINISHED';
            else if (currentTime >= featured.matchStartTime && currentTime <= featured.matchEndTime) featuredState = 'LIVE';

            if (featuredState === 'LIVE') featuredBox.classList.add('live-active');
            else featuredBox.classList.remove('live-active');

            let statusLabel = featured.timeDisplay;
            let isLive = featuredState === 'LIVE';
            if (isLive) statusLabel = "LIVE NOW";
            else if (featuredState === 'FINISHED') statusLabel = "MATCH FINISHED";

            let s1 = featured.score1 !== undefined ? featured.score1 : (featuredState === 'UPCOMING' ? '' : '0');
            let s2 = featured.score2 !== undefined ? featured.score2 : (featuredState === 'UPCOMING' ? '' : '0');

            featuredBox.innerHTML = `
                ${isLive ? '<div class="live-badge">🔴 LIVE MATCH</div>' : ''}
                <div class="match-row">
                    <div class="team-box"><div class="team-flag">${getFlag(featured.team1)}</div><div class="team-name">${featured.team1}</div></div>
                    <div class="score-box">${featuredState === 'UPCOMING' ? '<div class="vs-box">VS</div>' : `${s1} - ${s2}`}</div>
                    <div class="team-box"><div class="team-flag">${getFlag(featured.team2)}</div><div class="team-name">${featured.team2}</div></div>
                </div>
                <div class="match-status">${statusLabel} (${featured.group})</div>
            `;

            // Display limit to 3 items max inside timetable box to strictly avoid overflow
            const displayLimitMatches = todayMatches.filter(m => m !== featured).slice(0, 3);

            miniList.innerHTML = displayLimitMatches.map(m => {
                let miniStatus = m.timeDisplay;
                if (m.isFinished) miniStatus = `🏁 FT (${m.score1}-${m.score2})`;
                else if (currentTime >= m.matchStartTime && currentTime <= m.matchEndTime) miniStatus = `🔴 LIVE`;
                
                return `
                    <div class="mini-match-item">
                        <span>${getFlag(m.team1)} ${m.team1} &nbsp;<span style="color:rgba(255,255,255,0.3); font-style:italic;">vs</span>&nbsp; ${m.team2} ${getFlag(m.team2)}</span>
                        <span class="mini-status" style="${miniStatus === '🔴 LIVE' ? 'color: #ff5252;' : ''}">${miniStatus}</span>
                    </div>
                `;
            }).join('');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();
            if (now.getSeconds() === 0) processKioskDisplay();
        }

        updateTime();
        processKioskDisplay();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
